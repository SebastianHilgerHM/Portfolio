<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hangman - Start</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="ascii-shell" role="main">
      <pre class="ascii-boundary" aria-hidden="true">+----------------------------------------------+</pre>
      <div class="ascii-panel" aria-label="Hangman Navigation">
        <div class="ascii-row">
          <span class="ascii-rail" aria-hidden="true">|</span>
          <div class="ascii-row__content ascii-row__content--center">
            <h1>Hangman</h1>
            <p>Starte mit deiner bisherigen Wortliste oder erfasse neue Begriffe.</p>
          </div>
          <span class="ascii-rail" aria-hidden="true">|</span>
        </div>
        <div class="ascii-row">
          <span class="ascii-rail" aria-hidden="true">|</span>
          <div class="ascii-row__content ascii-row__content--flush">
            <p class="ascii-separator">----------------------------------------------</p>
          </div>
          <span class="ascii-rail" aria-hidden="true">|</span>
        </div>
        <div class="ascii-row">
          <span class="ascii-rail" aria-hidden="true">|</span>
          <div class="ascii-row__content">
            <button id="new-game">Spiel starten</button>
            <button id="words-link">Neue Wörter eingeben</button>
            <p id="feedback" role="status"></p>
          </div>
          <span class="ascii-rail" aria-hidden="true">|</span>
        </div>
      </div>
      <pre class="ascii-boundary" aria-hidden="true">+----------------------------------------------+</pre>
    </main>
    <script>
      const statusEl = document.getElementById('feedback');
      const startButton = document.getElementById('new-game');
      const wordsButton = document.getElementById('words-link');

      const getGameState = async () => {
        const response = await fetch('/api/game/state');
        if (!response.ok) {
          throw new Error('Spielzustand konnte nicht geladen werden.');
        }
        const data = await response.json();
        return data.state;
      };

      const startRound = async () => {
        const response = await fetch('/api/game/start', { method: 'POST' });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || 'Konnte Runde nicht starten.');
        }
        window.location.href = '/game.html';
      };

      const nextRound = async () => {
        const response = await fetch('/api/game/next', { method: 'POST' });
        const data = await response.json();
        if (data.done) {
          throw new Error('Keine Wörter mehr vorhanden. Bitte neue Wörter eingeben.');
        }
        if (!response.ok) {
          throw new Error(data.message || 'Nächste Runde nicht möglich.');
        }
        window.location.href = '/game.html';
      };

      const ensureRound = async () => {
        statusEl.textContent = 'Prüfe Spielsituation...';
        const state = await getGameState();
        if (state && state.status === 'running') {
          statusEl.textContent = '';
          window.location.href = '/game.html';
          return;
        }

        if (state && state.status === 'won') {
          if (state.remainingWords > 0) {
            await nextRound();
          } else {
            await startRound();
          }
          return;
        }

        if (state && state.status === 'lost') {
          await startRound();
          return;
        }

        await startRound();
      };

      startButton.addEventListener('click', async () => {
        try {
          await ensureRound();
          statusEl.textContent = '';
        } catch (error) {
          statusEl.textContent = error.message || 'Bitte zuerst neue Wörter eingeben.';
        }
      });

      wordsButton.addEventListener('click', async () => {
        statusEl.textContent = 'Bereite neue Wortliste vor...';
        try {
          const response = await fetch('/api/game', { method: 'POST' });
          if (!response.ok) {
            throw new Error('Konnte Spiel nicht zurücksetzen.');
          }
          window.location.href = '/words.html';
        } catch (error) {
          statusEl.textContent = error.message;
        }
      });
    </script>
  </body>
</html>
